<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alhiem//Portfolio</title>
    <meta name="description"
        content="Windows XP-themed interactive portfolio desktop for me (Sayed Sadid Hoda). Explore my projects, skills, and more through draggable windows.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.js"></script>
    <style>
        /* ========== TOKENS ========== */
        :root {
            --bg: #050508;
            --surface: rgba(195, 181, 255, 0.06);
            --border: #C3B5FF;
            --border-dim: rgba(195, 181, 255, 0.25);
            --accent: #C3B5FF;
            --accent-glow: rgba(195, 181, 255, 0.4);
            --white: #FFFFFF;
            --dim: rgba(195, 181, 255, 0.5);
            --titlebar: linear-gradient(135deg, #2a1f5e 0%, #1a1040 40%, #2a1f5e 100%);
            --titlebar-inactive: linear-gradient(135deg, #151020 0%, #0d0a18 40%, #151020 100%);
            --btn-close: #FF4466;
            --btn-min: #C3B5FF;
            --btn-max: #C3B5FF;
        }

        /* ========== RESET ========== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            background: var(--bg);
            color: var(--accent);
            font-family: 'Share Tech Mono', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
            cursor: default;
            user-select: none;
        }

        ::selection {
            background: var(--accent);
            color: var(--bg);
        }

        /* ========== NOISE OVERLAY ========== */
        .noise {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.08;
            z-index: 9999;
            pointer-events: none;
        }

        /* ========== DESKTOP AREA ========== */
        #desktop {
            position: relative;
            width: 100vw;
            height: calc(100vh - 40px);
            overflow: hidden;
            background:
                radial-gradient(ellipse at 30% 60%, rgba(195, 181, 255, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 30%, rgba(195, 181, 255, 0.03) 0%, transparent 50%),
                linear-gradient(rgba(195, 181, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(195, 181, 255, 0.015) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 50px 50px, 50px 50px;
        }

        /* ========== DESKTOP ICONS ========== */
        .desktop-icons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 16px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 80px;
            padding: 8px 4px;
            border: 1px solid transparent;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .desktop-icon:hover {
            background: rgba(195, 181, 255, 0.08);
            border-color: var(--border-dim);
        }

        .desktop-icon.selected {
            background: rgba(195, 181, 255, 0.12);
            border-color: var(--accent);
        }

        .desktop-icon .icon-img {
            font-size: 36px;
            line-height: 1;
            filter: drop-shadow(0 0 4px var(--accent-glow));
        }

        .desktop-icon .icon-label {
            font-size: 11px;
            color: var(--white);
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9), 0 0 6px rgba(0, 0, 0, 0.5);
            word-wrap: break-word;
            max-width: 76px;
        }

        /* ========== WINDOWS ========== */
        .xp-window {
            position: absolute;
            min-width: 320px;
            min-height: 200px;
            background: var(--bg);
            border: 1px solid var(--accent);
            box-shadow: 0 4px 30px rgba(195, 181, 255, 0.15), 0 0 1px var(--accent);
            display: flex;
            flex-direction: column;
            z-index: 100;
            animation: winOpen 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes winOpen {
            0% {
                transform: scale(0.85);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .xp-window.maximized {
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: calc(100vh - 40px) !important;
        }

        .xp-window.minimized {
            display: none !important;
        }

        .win-titlebar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--titlebar);
            padding: 4px 8px;
            cursor: move;
            border-bottom: 1px solid var(--accent);
            flex-shrink: 0;
        }

        .win-titlebar.inactive {
            background: var(--titlebar-inactive);
            border-bottom-color: var(--border-dim);
        }

        .win-title {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--white);
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 6px var(--accent-glow);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .win-title-icon {
            font-size: 14px;
        }

        .win-controls {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .win-btn {
            width: 20px;
            height: 20px;
            border: 1px solid var(--border-dim);
            background: rgba(5, 5, 8, 0.8);
            color: var(--accent);
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            line-height: 1;
        }

        .win-btn:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .win-btn-close:hover {
            background: var(--btn-close);
            border-color: var(--btn-close);
            color: #fff;
            box-shadow: 0 0 8px rgba(255, 68, 102, 0.5);
        }

        .win-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: var(--surface);
            color: var(--accent);
            font-size: 13px;
            line-height: 1.6;
        }

        .win-body::-webkit-scrollbar {
            width: 6px;
        }

        .win-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .win-body::-webkit-scrollbar-thumb {
            background: var(--border-dim);
            border-radius: 3px;
        }

        .win-body::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .win-body a {
            color: var(--white);
            text-decoration: none;
            transition: all 0.15s;
        }

        .win-body a:hover {
            text-decoration: underline;
            text-shadow: 0 0 6px var(--accent-glow);
        }

        /* ========== WINDOW-SPECIFIC CONTENT ========== */
        .recycle-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border: 1px solid var(--border-dim);
            margin-bottom: 8px;
            background: rgba(195, 181, 255, 0.03);
            transition: all 0.15s;
        }

        .recycle-item:hover {
            background: rgba(195, 181, 255, 0.08);
            border-color: var(--accent);
        }

        .recycle-item .ri-icon {
            font-size: 20px;
            opacity: 0.5;
        }

        .recycle-item .ri-name {
            color: var(--white);
            font-weight: bold;
        }

        .recycle-item .ri-info {
            color: var(--dim);
            font-size: 11px;
        }

        .project-entry {
            border: 1px solid var(--border-dim);
            padding: 14px 16px;
            margin-bottom: 10px;
            background: rgba(195, 181, 255, 0.03);
            transition: all 0.2s;
            cursor: default;
        }

        .project-entry:hover {
            border-color: var(--accent);
            background: rgba(195, 181, 255, 0.06);
        }

        .project-entry h3 {
            color: var(--white);
            font-size: 14px;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .project-entry p {
            color: var(--accent);
            font-size: 12px;
            margin-bottom: 6px;
        }

        .project-entry .pe-meta {
            color: var(--dim);
            font-size: 11px;
        }

        .project-entry .pe-status {
            color: var(--white);
        }

        .skill-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .skill-item {
            border: 1px solid var(--border-dim);
            padding: 6px 12px;
            font-size: 12px;
            color: var(--white);
            background: rgba(195, 181, 255, 0.04);
            transition: all 0.15s;
        }

        .skill-item:hover {
            border-color: var(--accent);
            background: rgba(195, 181, 255, 0.1);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .about-line {
            margin-bottom: 12px;
        }

        .about-label {
            color: var(--dim);
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .about-value {
            color: var(--white);
            font-size: 13px;
        }

        .connect-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border: 1px solid var(--border-dim);
            margin-bottom: 8px;
            transition: all 0.15s;
        }

        .connect-item:hover {
            border-color: var(--accent);
            background: rgba(195, 181, 255, 0.06);
        }

        .connect-item .ci-icon {
            font-size: 18px;
        }

        /* ========== TERMINAL IN WINDOW ========== */
        .terminal-body {
            padding: 0 !important;
            display: flex;
            flex-direction: column;
            background: var(--bg) !important;
        }

        #terminal-output-win {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
            font-size: 13px;
            line-height: 1.6;
            font-family: 'Cascadia Code', 'Consolas', 'Share Tech Mono', monospace;
        }

        #terminal-output-win::-webkit-scrollbar {
            width: 5px;
        }

        #terminal-output-win::-webkit-scrollbar-track {
            background: transparent;
        }

        #terminal-output-win::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        #terminal-output-win .output-line {
            white-space: pre-wrap;
            word-break: break-word;
        }

        #terminal-output-win .output-line a {
            color: var(--white);
            text-decoration: none;
        }

        #terminal-output-win .output-line a:hover {
            text-decoration: underline;
        }

        .term-prompt-line {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            padding: 4px 14px 8px;
            background: var(--bg);
            border-top: 1px solid var(--border-dim);
        }

        .term-prompt-prefix {
            white-space: nowrap;
            flex-shrink: 0;
        }

        .term-ps {
            color: var(--white);
        }

        .term-path {
            color: var(--white);
        }

        .term-gt {
            color: var(--white);
            margin-right: 6px;
        }

        .term-input-wrap {
            position: relative;
            flex: 1;
            min-width: 0;
        }

        #term-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--accent);
            font-family: inherit;
            font-size: 13px;
            width: 100%;
            caret-color: transparent;
            line-height: 1.6;
        }

        #term-mirror {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            color: var(--accent);
            font-family: inherit;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre;
        }

        .block-cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: var(--accent);
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* ========== TASKBAR ========== */
        #taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(180deg, #1a1040 0%, #0d0818 100%);
            border-top: 1px solid var(--accent);
            display: flex;
            align-items: center;
            z-index: 10000;
            padding: 0 4px;
        }

        #start-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            height: 32px;
            background: linear-gradient(180deg, #3a2a7e 0%, #1a1040 100%);
            border: 1px solid var(--accent);
            color: var(--white);
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.15s;
            margin-right: 4px;
        }

        #start-btn:hover {
            background: linear-gradient(180deg, #4a3a9e 0%, #2a1a60 100%);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        #start-btn .start-logo {
            font-size: 16px;
        }

        .taskbar-apps {
            display: flex;
            gap: 3px;
            flex: 1;
            overflow-x: auto;
            padding: 0 4px;
        }

        .taskbar-app {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 3px 12px;
            height: 28px;
            background: rgba(195, 181, 255, 0.06);
            border: 1px solid var(--border-dim);
            color: var(--accent);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .taskbar-app:hover {
            background: rgba(195, 181, 255, 0.12);
            border-color: var(--accent);
        }

        .taskbar-app.active {
            background: rgba(195, 181, 255, 0.15);
            border-color: var(--accent);
            color: var(--white);
        }

        .taskbar-clock {
            padding: 0 14px;
            color: var(--white);
            font-size: 12px;
            border-left: 1px solid var(--border-dim);
            height: 100%;
            display: flex;
            align-items: center;
            letter-spacing: 1px;
        }

        /* ========== START MENU ========== */
        #start-menu {
            position: fixed;
            bottom: 40px;
            left: 0;
            width: 280px;
            background: var(--bg);
            border: 1px solid var(--accent);
            box-shadow: 0 -4px 30px rgba(195, 181, 255, 0.2);
            z-index: 10001;
            display: none;
            animation: menuSlide 0.15s ease-out;
        }

        @keyframes menuSlide {
            0% {
                transform: translateY(10px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        #start-menu.visible {
            display: block;
        }

        .start-header {
            background: var(--titlebar);
            padding: 12px 14px;
            border-bottom: 1px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .start-avatar {
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: rgba(195, 181, 255, 0.1);
        }

        .start-username {
            color: var(--white);
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .start-items {
            padding: 6px 0;
        }

        .start-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.12s;
            color: var(--accent);
            font-size: 12px;
        }

        .start-item:hover {
            background: rgba(195, 181, 255, 0.1);
            color: var(--white);
        }

        .start-item .si-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .start-divider {
            height: 1px;
            background: var(--border-dim);
            margin: 4px 14px;
        }

        .start-footer {
            border-top: 1px solid var(--accent);
            padding: 8px 14px;
            display: flex;
            justify-content: flex-end;
        }

        .start-footer-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: transparent;
            border: 1px solid var(--border-dim);
            color: var(--accent);
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            transition: all 0.15s;
        }

        .start-footer-btn:hover {
            border-color: var(--accent);
            color: var(--white);
            background: rgba(195, 181, 255, 0.08);
        }

        /* ========== DOOM / JS-DOS ========== */
        @keyframes doomLoad {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(350%);
            }
        }

        #doom-container {
            background: #000;
        }

        #doom-container .emulator-mouse-overlay {
            cursor: crosshair !important;
        }

        /* Hide js-dos default UI elements to keep it clean inside XP window */
        #doom-container .sidebar-header,
        #doom-container .sidebar,
        #doom-container .header,
        #doom-container .jsdos-player-button,
        #doom-container .controls-container,
        #doom-container .player-header {
            display: none !important;
        }

        #doom-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            .desktop-icon {
                width: 68px;
            }

            .desktop-icon .icon-img {
                font-size: 28px;
            }

            .desktop-icon .icon-label {
                font-size: 10px;
            }

            .xp-window {
                min-width: 280px;
            }
        }
    </style>
</head>

<body>

    <div class="noise"></div>

    <!-- DESKTOP -->
    <div id="desktop">
        <div class="desktop-icons">
            <div class="desktop-icon" ondblclick="openApp('recycle')" onclick="selectIcon(this)">
                <div class="icon-img">🗑️</div>
                <div class="icon-label">Recycle Bin</div>
            </div>
            <div class="desktop-icon" ondblclick="openApp('terminal')" onclick="selectIcon(this)">
                <div class="icon-img">💻</div>
                <div class="icon-label">Terminal</div>
            </div>
            <div class="desktop-icon" ondblclick="openApp('projects')" onclick="selectIcon(this)">
                <div class="icon-img">📁</div>
                <div class="icon-label">My Projects</div>
            </div>
            <div class="desktop-icon" ondblclick="openApp('explorer')" onclick="selectIcon(this)">
                <div class="icon-img">🗂️</div>
                <div class="icon-label">Explorer</div>
            </div>
            <div class="desktop-icon" ondblclick="openApp('about')" onclick="selectIcon(this)">
                <div class="icon-img">📄</div>
                <div class="icon-label">About Me</div>
            </div>
            <div class="desktop-icon" ondblclick="openApp('connect')" onclick="selectIcon(this)">
                <div class="icon-img">🌐</div>
                <div class="icon-label">Connect</div>
            </div>
            <div class="desktop-icon" ondblclick="openApp('doom')" onclick="selectIcon(this)">
                <div class="icon-img"><img src="doom-icon.jpg" alt="DOOM"
                        style="width:36px;height:36px;object-fit:cover;border-radius:2px;image-rendering:pixelated;">
                </div>
                <div class="icon-label">DOOM</div>
            </div>
            <div class="desktop-icon" ondblclick="openApp('calculator')" onclick="selectIcon(this)">
                <div class="icon-img" style="display:flex;justify-content:center;align-items:center;height:36px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="36" viewBox="0 0 20 24"
                        style="filter:drop-shadow(2px 2px 3px rgba(0,0,0,0.8));">

                        <circle cx="5" cy="11.5" r="1.3" fill="#6c7a89" />
                        <circle cx="8" cy="11.5" r="1.3" fill="#6c7a89" />
                        <circle cx="11" cy="11.5" r="1.3" fill="#6c7a89" />
                        <circle cx="14" cy="11.5" r="1.3" fill="#6c7a89" />
                        <rect x="4" y="14" width="3.5" height="2" rx="0.5" fill="#d1d5db" />
                        <rect x="8.5" y="14" width="3.5" height="2" rx="0.5" fill="#d1d5db" />
                        <rect x="13" y="14" width="3.5" height="2" rx="0.5" fill="#ff7f50" />
                        <rect x="4" y="17" width="3.5" height="2" rx="0.5" fill="#d1d5db" />
                        <rect x="8.5" y="17" width="3.5" height="2" rx="0.5" fill="#d1d5db" />
                        <rect x="13" y="17" width="3.5" height="2" rx="0.5" fill="#ff7f50" />
                        <rect x="4" y="20" width="3.5" height="2" rx="0.5" fill="#d1d5db" />
                        <rect x="8.5" y="20" width="3.5" height="2" rx="0.5" fill="#d1d5db" />
                        <rect x="13" y="20" width="3.5" height="2" rx="0.5" fill="#3b82f6" />

                        }

            function getDisplayPath(pathSegs) {
                return PORTFOLIO_ROOT.concat(pathSegs).join('\\');
            }

            function findChildKey(node, name) {
                if (!node || node.type !== 'dir' || !node.children) return null;
                return Object.keys(node.children).find(k => k.toLowerCase() === name.toLowerCase()) || null;
            }

            function getNodeByPath(pathSegs) {
                let node = VFS;
                for (const seg of pathSegs) {
                    if (!node || node.type !== 'dir') return null;
                    const key = findChildKey(node, seg);
                    if (!key) return null;
                    node = node.children[key];
                }
                return node;
            }

            function resolvePath(input, cwdSegs) {
                const raw = (input || '').trim().replace(/\//g, '\\');
                if (!raw) return { path: cwdSegs.slice(), node: getNodeByPath(cwdSegs) };

                let working = [];
                let parts = [];

                if (/^[a-zA-Z]:\\/.test(raw)) {
                    const normalizedRoot = PORTFOLIO_ROOT.join('\\').toLowerCase();
                    const normalizedRaw = raw.toLowerCase();
                    if (!normalizedRaw.startsWith(normalizedRoot)) {
                        return { error: 'Access denied outside portfolio sandbox.' };
                    }
                    const remainder = raw.slice(PORTFOLIO_ROOT.join('\\').length);
                    parts = remainder.split('\\').filter(Boolean);
                } else if (raw.startsWith('\\')) {
                    parts = raw.split('\\').filter(Boolean);
                } else {
                    working = cwdSegs.slice();
                    parts = raw.split('\\').filter(Boolean);
                }

                for (const part of parts) {
                    if (part === '.') continue;
                    if (part === '..') {
                        if (working.length > 0) working.pop();
                        continue;
                    }

                    const parent = getNodeByPath(working);
                    if (!parent || parent.type !== 'dir') return { error: 'Path is not a directory.' };
                    const key = findChildKey(parent, part);
                    if (!key) return { error: 'Cannot find path: ' + part };
                    working.push(key);
                }

                const node = getNodeByPath(working);
                if (!node) return { error: 'Path not found.' };
                return { path: working, node };
            }

            function listDirectoryEntries(node) {
                if (!node || node.type !== 'dir') return [];
                const keys = Object.keys(node.children || {});
                keys.sort((a, b) => {
                    const aNode = node.children[a];
                    const bNode = node.children[b];
                    if (aNode.type === 'dir' && bNode.type !== 'dir') return -1;
                    if (aNode.type !== 'dir' && bNode.type === 'dir') return 1;
                    return a.localeCompare(b);
                });
                return keys.map(name => ({ name, node: node.children[name] }));
            }

            function openVirtualNode(name, node) {
                if (!node) return { status: 'Item not found.' };

                if (node.type === 'shortcut' && node.app) {
                    openApp(node.app);
                    return { status: 'Opened shortcut: ' + name };
                }

                if (node.type === 'link' && node.url) {
                    window.open(node.url, '_blank', 'noopener');
                    return { status: 'Opened link: ' + name };
                }

                if (node.type === 'file') {
                    return {
                        status: 'Opened file: ' + name,
                        lines: node.content.split('\n').map(line => line || ' ')
                    };
                }

                return { status: 'Cannot open this item directly.' };
            }

            function initExplorer(winId, initialPath) {
                const win = document.getElementById(winId);
                if (!win) return;

                const list = win.querySelector('.exp-list');
                const pathText = win.querySelector('.exp-path');
                const upBtn = win.querySelector('.exp-up');
                const rootBtn = win.querySelector('.exp-root');
                const status = win.querySelector('.exp-status');
                if (!list || !pathText || !upBtn || !rootBtn || !status) return;

                let cwd = Array.isArray(initialPath) ? initialPath.slice() : [];

                function setStatus(msg) {
                    status.textContent = msg;
                }

                function render() {
                    const node = getNodeByPath(cwd);
                    if (!node || node.type !== 'dir') {
                        cwd = [];
                    }

                    const current = getNodeByPath(cwd);
                    const entries = listDirectoryEntries(current);
                    pathText.textContent = getDisplayPath(cwd);
                    upBtn.disabled = cwd.length === 0;
                    list.innerHTML = '';

                    if (entries.length === 0) {
                        const empty = document.createElement('div');
                        empty.style.color = 'var(--dim)';
                        empty.style.padding = '8px';
                        empty.textContent = 'This folder is empty.';
                        list.appendChild(empty);
                    }

                    entries.forEach(({ name, node: entry }) => {
                        const row = document.createElement('div');
                        row.className = 'clickable';
                        row.style.display = 'grid';
                        row.style.gridTemplateColumns = '22px 1fr 80px';
                        row.style.alignItems = 'center';
                        row.style.padding = '4px 8px';
                        row.style.borderBottom = '1px solid #1f2229';
                        row.style.fontSize = '11px';

                        const icon = entry.type === 'dir' ? '📁' : (entry.type === 'shortcut' ? '↗' : (entry.type === 'link' ? '🌐' : '📄'));
                        const type = entry.type === 'dir' ? 'Folder' : (entry.type === 'shortcut' ? 'Shortcut' : (entry.type === 'link' ? 'Internet' : 'Text'));

                        row.innerHTML = '<span>' + icon + '</span><span style="color:var(--white);">' + name + '</span><span style="color:var(--dim);text-align:right;">' + type + '</span>';

                        row.addEventListener('mouseenter', () => {
                            row.style.background = 'rgba(48, 104, 196, 0.18)';
                        });
                        row.addEventListener('mouseleave', () => {
                            row.style.background = 'transparent';
                        });

                        row.addEventListener('click', () => {
                            setStatus(name + ' selected');
                        });

                        row.addEventListener('dblclick', () => {
                            if (entry.type === 'dir') {
                                cwd.push(name);
                                setStatus('Opened folder: ' + name);
                                render();
                                return;
                            }

                            const result = openVirtualNode(name, entry);
                            setStatus(result.status);
                        });

                        list.appendChild(row);
                    });
                }

                upBtn.addEventListener('click', () => {
                    if (cwd.length > 0) {
                        cwd.pop();
                        render();
                    }
                });

                rootBtn.addEventListener('click', () => {
                    cwd = [];
                    render();
                });

                render();
                setStatus('Explorer ready. Double-click folders to navigate.');

                    input.selectionStart = input.selectionEnd = start + text.length;
                    input.focus();
                }
            };

                const input = document.getElementById('calc-in-' + id);
                if (input && input.value.length > 0) {
                    const start = input.selectionStart;
                    if (start > 0) {
                        input.value = input.value.substring(0, start - 1) + input.value.substring(start);
                        input.selectionStart = input.selectionEnd = start - 1;
                    }
                    input.focus();
                }

            window.calcClear = function (id) {
                const input = document.getElementById('calc-in-' + id);
                const ans = document.getElementById('calc-ans-' + id);
                const hist = document.getElementById('calc-history-' + id);
                const status = document.getElementById('calc-status-' + id);
                if (input) input.value = '';
                if (ans) ans.textContent = '';
                if (hist) hist.innerHTML = '';
                if (status) status.textContent = "Memory Cleared.";
                if (window.calcScopes[id]) window.calcScopes[id] = {}; // clear memory

                window.calcRenderGrid(id); // reset graph
                input && input.focus();
            };

            window.calcEvalKey = function (e, id) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    window.calcEval(id);
                }
            };

            // Unified Evaluation & Graphing function
            window.calcEval = function (id) {
                const input = document.getElementById('calc-in-' + id);
                const ans = document.getElementById('calc-ans-' + id);
                const status = document.getElementById('calc-status-' + id);

                if (!input || !input.value.trim() || typeof math === 'undefined') return;

                const expr = input.value;
                if (!window.calcScopes[id]) window.calcScopes[id] = {};

                // If equation contains "x" and is not an assignment, we should Plot it
                if (expr.includes('x') && !expr.includes('=')) {
                    ans.textContent = 'Plotting f(x)...';
                    const pane = document.getElementById('calc-graph-pane-' + id);
                    if (pane.style.display === 'none') window.calcToggleGraph(id);
                    setTimeout(() => window.calcGraph(id, expr), 60);
                    pushHistory(id, expr, '[Graph plotted]');
                    input.focus();
                    return;
                }

                // Normal math.js evaluation
                try {
                    const result = math.evaluate(expr, window.calcScopes[id]);
                    ans.textContent = expr + ' =';

                    let resultStr = "";
                    if (typeof result === 'function') {
                        resultStr = 'ƒunction saved';
                    } else if (result && result.isResultSet) {
                        const vals = result.entries.map(e => math.format(e, { precision: 14 }));
                        resultStr = vals[vals.length - 1];
                    } else {
                        resultStr = math.format(result, { precision: 14 });
                    }

                    input.value = resultStr;
                    pushHistory(id, expr, resultStr);
                    if (status) status.textContent = `Evaluated successfully.`;
                } catch (e) {
                    ans.textContent = 'Syntax Error';
                    if (status) status.textContent = `Error: ${e.message}`;
                }
                input.focus();
            };

            window.calcRenderGrid = function (id) {
                const canvas = document.getElementById('calc-graph-' + id);
                if (!canvas) return;

                // Dynamically sync canvas internal resolution to its actual display flex size
                const rect = canvas.parentElement.getBoundingClientRect();
                if (rect.width > 0 && rect.height > 0) {
                    canvas.width = rect.width;
                    canvas.height = rect.height;
                }

                const ctx = canvas.getContext('2d');
                const w = canvas.width;
                const h = canvas.height;

                ctx.clearRect(0, 0, w, h);

                // Grid background
                ctx.strokeStyle = 'rgba(195,181,255,0.05)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (let i = 0; i < w; i += 20) { ctx.moveTo(i, 0); ctx.lineTo(i, h); }
                for (let i = 0; i < h; i += 20) { ctx.moveTo(0, i); ctx.lineTo(w, i); }
                ctx.stroke();

                // Centered Axes
                ctx.strokeStyle = 'rgba(195,181,255,0.3)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(w / 2, 0); ctx.lineTo(w / 2, h); // Y axis
                ctx.moveTo(0, h / 2); ctx.lineTo(w, h / 2); // X axis
                ctx.stroke();
            };

            window.calcGraph = function (id, expr) {
                const canvas = document.getElementById('calc-graph-' + id);
                const status = document.getElementById('calc-status-' + id);
                if (!canvas) return;

                // Ensure actual size is matched for high-fidelity drawing instead of stretching
                window.calcRenderGrid(id);

                const ctx = canvas.getContext('2d');
                const w = canvas.width;
                const h = canvas.height;

                let compiled;
                try {
                    compiled = math.compile(expr);
                } catch (e) {
                    if (status) status.textContent = `Graph Syntax Error: ${e.message}`;
                    return;
                }

                ctx.strokeStyle = '#C3B5FF'; // Cyber purple
                ctx.lineWidth = 2;
                ctx.beginPath();

                const scale = 20; // 20 pixels = 1 unit => ranges from typically -10 to +10 roughly depending on width
                let first = true;
                let scope = Object.assign({}, window.calcScopes[id]);

                let plotsDrawn = 0;

                for (let px = 0; px <= w; px += 1) {
                    let rx = (px - w / 2) / scale;
                    scope.x = rx;
                    let ry;
                    try {
                        ry = compiled.evaluate(scope);
                    } catch (e) { continue; }

                    if (typeof ry !== 'number' || isNaN(ry) || !isFinite(ry)) continue;

                    let py = h / 2 - (ry * scale);

                    if (first) { ctx.moveTo(px, py); first = false; }
                    else { ctx.lineTo(px, py); }
                    plotsDrawn++;
                }

                ctx.stroke();
                if (status && plotsDrawn > 0) {
                    status.textContent = `Showing graph for f(x) = ${expr}`;
                } else if (status) {
                    status.textContent = `Expression evaluated but yielded empty plot.`;
                }
            };

                const win = document.getElementById(winId);
                if (win) {
                    win.classList.add('minimized');
                    openWindows[winId].minimized = true;
                    updateTaskbar();
                }
            };

            window.maximizeWindow = function (winId) {
                const win = document.getElementById(winId);
                if (!win) return;
                if (openWindows[winId].maximized) {
                    win.classList.remove('maximized');
                    openWindows[winId].maximized = false;
                } else {
                    win.classList.add('maximized');
                    openWindows[winId].maximized = true;
                }
            };

            function restoreWindow(winId) {
                const win = document.getElementById(winId);
                if (win) {
                    win.classList.remove('minimized');
                    openWindows[winId].minimized = false;
                    focusWindow(winId);
                    updateTaskbar();
                }
            }

            // ── Taskbar ──
            function updateTaskbar() {
                const container = document.getElementById('taskbar-apps');
                container.innerHTML = '';
                for (const [winId, state] of Object.entries(openWindows)) {
                    const app = APPS[state.appId];
                    const btn = document.createElement('div');
                    btn.className = 'taskbar-app' + (winId === activeWindowId && !state.minimized ? ' active' : '');
                    btn.innerHTML = `${app.icon} ${app.title}`;
                    btn.onclick = () => {
                        if (state.minimized) {
                            restoreWindow(winId);
                        } else if (winId === activeWindowId) {
                            minimizeWindow(winId);
                        } else {
                            focusWindow(winId);
                        }
                    };
                    container.appendChild(btn);
                }
            }

            // ── Dragging ──
            let dragState = null;

            window.startDrag = function (e, winId) {
                if (e.target.classList.contains('win-btn')) return;
                const win = document.getElementById(winId);
                if (!win || openWindows[winId]?.maximized) return;
                focusWindow(winId);
                dragState = {
                    winId,
                    startX: e.clientX,
                    startY: e.clientY,
                    origLeft: win.offsetLeft,
                    origTop: win.offsetTop
                };
                e.preventDefault();
            };

            document.addEventListener('mousemove', (e) => {
                if (!dragState) return;
                const win = document.getElementById(dragState.winId);
                if (!win) { dragState = null; return; }
                const dx = e.clientX - dragState.startX;
                const dy = e.clientY - dragState.startY;
                win.style.left = (dragState.origLeft + dx) + 'px';
                win.style.top = (dragState.origTop + dy) + 'px';
            });

            document.addEventListener('mouseup', () => { dragState = null; });

            // ── Open App (from icon or start menu) ──
            window.openApp = function (appId) {
                // Check if already open, restore if minimized, else focus
                for (const [winId, state] of Object.entries(openWindows)) {
                    if (state.appId === appId) {
                        if (state.minimized) {
                            restoreWindow(winId);
                        } else {
                            focusWindow(winId);
                        }
                        return;
                    }
                }
                createWindow(appId);
            };

            // ── Icon Selection ──
            window.selectIcon = function (el) {
                document.querySelectorAll('.desktop-icon').forEach(i => i.classList.remove('selected'));
                el.classList.add('selected');
            };

            document.getElementById('desktop').addEventListener('click', (e) => {
                if (e.target === document.getElementById('desktop') || e.target.classList.contains('desktop-icons')) {
                    document.querySelectorAll('.desktop-icon').forEach(i => i.classList.remove('selected'));
                }
            });

            // ── Start Menu ──
            window.toggleStartMenu = function () {
                document.getElementById('start-menu').classList.toggle('visible');
            };

            window.closeStartMenu = function () {
                document.getElementById('start-menu').classList.remove('visible');
            };

            document.addEventListener('click', (e) => {
                const menu = document.getElementById('start-menu');
                const btn = document.getElementById('start-btn');
                if (!menu.contains(e.target) && !btn.contains(e.target)) {
                    menu.classList.remove('visible');
                }
            });

            // ── Clock ──
            function updateClock() {
                const now = new Date();
                const h = now.getHours().toString().padStart(2, '0');
                const m = now.getMinutes().toString().padStart(2, '0');
                document.getElementById('taskbar-clock').textContent = h + ':' + m;
            }
            updateClock();
            setInterval(updateClock, 30000);

            // ── Terminal Logic ──
            function initTerminal(winId) {
                const win = document.getElementById(winId);
                if (!win) return;

                const output = win.querySelector('#terminal-output-win');
                const input = win.querySelector('#term-input');
                const mirror = win.querySelector('#term-mirror');

                if (!output || !input || !mirror) return;

                const pathEl = win.querySelector('.term-path');
                const history = [];
                let historyIdx = -1;
                let isLocked = false;
                let cwd = [];
                const COMMANDS = ['help', 'whoami', 'projects', 'skills', 'education', 'connect', 'dir', 'ls', 'cd', 'tree', 'pwd', 'type', 'cat', 'open', 'explorer', 'clear', 'home'];

                function escapeHTML(str) {
                    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                }

                function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

                function printLine(html) {
                    const div = document.createElement('div');
                    div.className = 'output-line';
                    div.innerHTML = html;
                    output.appendChild(div);
                    output.scrollTop = output.scrollHeight;
                }

                function updatePromptPath() {
                    if (pathEl) {
                        pathEl.textContent = getDisplayPath(cwd);
                    }
                }

                function printPromptEcho(cmd) {
                    printLine('<span class="term-ps">PS </span><span class="term-path">' + escapeHTML(getDisplayPath(cwd)) + '</span><span class="term-gt">&gt;</span> ' + escapeHTML(cmd));
                }

                async function printLinesAnimated(lines) {
                    for (const line of lines) {
                        const div = document.createElement('div');
                        div.className = 'output-line';
                        output.appendChild(div);
                        const tmp = document.createElement('div');
                        tmp.innerHTML = line;
                        const text = tmp.textContent;
                        for (let i = 0; i < text.length; i++) {
                            div.textContent += text[i];
                            await sleep(3 + Math.random() * 3);
                        }
                        div.innerHTML = line;
                        output.scrollTop = output.scrollHeight;
                    }
                }

                function updateMirror() {
                    const val = input.value;
                    const pos = input.selectionStart || 0;
                    const before = escapeHTML(val.slice(0, pos));
                    const at = val[pos] ? escapeHTML(val[pos]) : '';
                    const after = escapeHTML(val.slice(pos + 1));
                    if (at) {
                        mirror.innerHTML = before + '<span class="block-cursor" style="color:var(--bg);background:var(--accent);">' + at + '</span>' + after;
                    } else {
                        mirror.innerHTML = before + '<span class="block-cursor"></span>';
                    }
                }

                function cmdHelp() {
                    return [
                        '<span style="color:var(--white)">Core:</span> help, whoami, projects, skills, education, connect, clear, home',
                        '<span style="color:var(--white)">Filesystem:</span> dir/ls, cd, pwd, tree, type/cat, open, explorer',
                        '<span style="color:var(--dim)">Tip: Use Tab for command autocomplete.</span>'
                    ];
                }

                function cmdPwd() {
                    return ['<span style="color:var(--white)">' + escapeHTML(getDisplayPath(cwd)) + '</span>'];
                }

                function cmdDir(target) {
                    const resolved = resolvePath(target || '.', cwd);
                    if (resolved.error) return ['<span style="color:var(--btn-close)">' + escapeHTML(resolved.error) + '</span>'];
                    if (!resolved.node || resolved.node.type !== 'dir') {
                        return ['<span style="color:var(--btn-close)">Not a directory.</span>'];
                    }

                    const entries = listDirectoryEntries(resolved.node);
                    const lines = ['<span style="color:var(--dim)">Directory: ' + escapeHTML(getDisplayPath(resolved.path)) + '</span>'];
                    if (entries.length === 0) {
                        lines.push('<span style="color:var(--dim)">(empty)</span>');
                        return lines;
                    }

                    entries.forEach(({ name, node }) => {
                        const marker = node.type === 'dir' ? '[DIR]' : '[FILE]';
                        lines.push('<span style="color:var(--white)">' + marker + '</span> ' + escapeHTML(name));
                    });
                    return lines;
                }

                function cmdCd(target) {
                    const resolved = resolvePath(target || '', cwd);
                    if (resolved.error) return ['<span style="color:var(--btn-close)">' + escapeHTML(resolved.error) + '</span>'];
                    if (!resolved.node || resolved.node.type !== 'dir') {
                        return ['<span style="color:var(--btn-close)">Not a directory.</span>'];
                    }
                    cwd = resolved.path.slice();
                    updatePromptPath();
                    return ['<span style="color:var(--dim)">Current directory: ' + escapeHTML(getDisplayPath(cwd)) + '</span>'];
                }

                function cmdTree(target) {
                    const resolved = resolvePath(target || '.', cwd);
                    if (resolved.error) return ['<span style="color:var(--btn-close)">' + escapeHTML(resolved.error) + '</span>'];
                    if (!resolved.node || resolved.node.type !== 'dir') {
                        return ['<span style="color:var(--btn-close)">Not a directory.</span>'];
                    }

                    const lines = ['<span style="color:var(--white)">' + escapeHTML(getDisplayPath(resolved.path)) + '</span>'];

                    function walk(node, prefix) {
                        const entries = listDirectoryEntries(node);
                        entries.forEach((entry, idx) => {
                            const isLast = idx === entries.length - 1;
                            const connector = isLast ? '└─ ' : '├─ ';
                            lines.push(escapeHTML(prefix + connector + entry.name));
                            if (entry.node.type === 'dir') {
                                walk(entry.node, prefix + (isLast ? '   ' : '│  '));
                            }
                        });
                    }

                    walk(resolved.node, '');
                    return lines;
                }

                function cmdType(target) {
                    if (!target) return ['<span style="color:var(--btn-close)">Usage: type filename.txt</span>'];
                    const resolved = resolvePath(target, cwd);
                    if (resolved.error) return ['<span style="color:var(--btn-close)">' + escapeHTML(resolved.error) + '</span>'];
                    if (!resolved.node || resolved.node.type !== 'file') {
                        return ['<span style="color:var(--btn-close)">Only text files can be displayed with type.</span>'];
                    }

                    const fileName = resolved.path[resolved.path.length - 1] || 'file';
                    const lines = ['<span style="color:var(--dim)">--- ' + escapeHTML(fileName) + ' ---</span>'];
                    resolved.node.content.split('\n').forEach(line => lines.push(escapeHTML(line || ' ')));
                    return lines;
                }

                function cmdOpen(target) {
                    if (!target) return ['<span style="color:var(--btn-close)">Usage: open item</span>'];
                    const resolved = resolvePath(target, cwd);
                    if (resolved.error) return ['<span style="color:var(--btn-close)">' + escapeHTML(resolved.error) + '</span>'];

                    if (resolved.node.type === 'dir') {
                        return ['<span style="color:var(--dim)">That item is a folder. Use cd to enter it.</span>'];
                    }

                    const itemName = resolved.path[resolved.path.length - 1] || target;
                    const result = openVirtualNode(itemName, resolved.node);
                    if (result.lines && result.lines.length) {
                        return ['<span style="color:var(--dim)">' + escapeHTML(result.status) + '</span>']
                            .concat(result.lines.map(line => escapeHTML(line)));
                    }
                    return ['<span style="color:var(--dim)">' + escapeHTML(result.status) + '</span>'];
                }

                function cmdExplorer(target) {
                    const resolved = resolvePath(target || '.', cwd);
                    if (resolved.error) return ['<span style="color:var(--btn-close)">' + escapeHTML(resolved.error) + '</span>'];
                    if (!resolved.node || resolved.node.type !== 'dir') {
                        return ['<span style="color:var(--btn-close)">Explorer target must be a folder.</span>'];
                    }

                    explorerLaunchPath = resolved.path.slice();
                    openApp('explorer');
                    return ['<span style="color:var(--dim)">Explorer launched at ' + escapeHTML(getDisplayPath(resolved.path)) + '</span>'];
                }

                function cmdWhoami() {
                    return [
                        '<span style="color:var(--white)">></span> <span style="color:var(--white)">Sayed Sadid Hoda</span> (aka Alhiem)',
                        '<span style="color:var(--white)">></span> Gamer. Retro nerd. Web builder.',
                        '<span style="color:var(--white)">></span> First-year B.Tech CSE (AI&ML) at LPU',
                        '<span style="color:var(--white)">></span> Based in <span style="color:var(--white)">Bangalore</span>',
                        '<span style="color:var(--white)">></span> I code for creative freedom. Websites are my canvas.',
                    ];
                }

                function cmdProjects() {
                    return [
                        '<span style="color:var(--white)">[1]</span>  <span style="color:var(--white)">Splotch</span> — streetwear e-commerce site. Firebase, auth, payments. <span style="color:var(--white)">● Active</span>',
                        '<span style="color:var(--white)">[2]</span>  <span style="color:var(--white)">ARROG</span> — community wiki. SCP-inspired lore, user submissions. <span style="color:var(--white)">● Delivered</span>',
                        '<span style="color:var(--white)">[3]</span>  <span style="color:var(--white)">RishabhDabral</span> — freelance portfolio for a law student. <span style="color:var(--white)">● Delivered</span>',
                        '<span style="color:var(--white)">[4]</span>  <span style="color:var(--white)">MaargDarshak</span> — career guidance tool for J&K students. <span style="color:var(--btn-close)">× Abandoned</span>',
                        '<span style="color:var(--white)">[5]</span>  <span style="color:var(--white)">Retro Arcade</span> — browser games, custom physics, neon vibes. <span style="color:var(--white)">● On GitHub</span>',
                        '<span style="color:var(--white)">[6]</span>  <span style="color:var(--white)">Weather Anomaly Detector</span> — spots weird weather, Chart.js graphs. <span style="color:var(--white)">● On GitHub</span>',
                    ];
                }

                function cmdSkills() {
                    return [
                        '<span style="color:var(--white)">></span> <span style="color:var(--white)">LANGUAGES</span>  Python · JavaScript · SQL · GDScript',
                        '<span style="color:var(--white)">></span> <span style="color:var(--white)">WEB</span>        HTML · CSS · React · Next.js · Node.js · Three.js',
                        '<span style="color:var(--white)">></span> <span style="color:var(--white)">TOOLS</span>      Firebase · MongoDB · Git · Vercel · Godot · Figma',
                        '<span style="color:var(--white)">></span> <span style="color:var(--white)">LEARNING</span>   B.Tech CSE (AI&ML)',
                    ];
                }

                function cmdEducation() {
                    return [
                        '<span style="color:var(--white)">></span> <span style="color:var(--white)">B.Tech CSE (AI&ML)</span>',
                        '   Lovely Professional University · 2025–29',
                        '',
                        '<span style="color:var(--white)">></span> <span style="color:var(--white)">Certs & Courses</span>',
                        '   C++ · Google Ambassador · Anglo-N-Hunt · Basic Indian Laws',
                        '   <span style="color:var(--dim)">Saylor · Google · Optimus (LPU) · Learnfoundationonline</span>',
                    ];
                }

                function cmdConnect() {
                    return [
                        '<span style="color:var(--white)">></span> <span style="color:var(--white)">LINKS</span>',
                        '<span style="color:var(--white)">Here\'s how to reach me:</span>',
                        '',
                        '   Email      →  <a href="mailto:sayedsadidhoda@gmail.com">sayedsadidhoda@gmail.com</a>',
                        '   GitHub     →  <a href="https://github.com/dudefromalhiem" target="_blank" rel="noopener">github.com/dudefromalhiem</a>',
                        '   LinkedIn   →  <a href="https://linkedin.com/in/sayedsadidhoda" target="_blank" rel="noopener">linkedin.com/in/sayedsadidhoda</a>',
                        '   Discord    →  <span style="color:var(--white)">@dudefromalhiem</span>',
                    ];
                }

                async function processCommand(raw) {
                    const trimmed = raw.trim();
                    if (!trimmed) return;

                    const parts = trimmed.split(/\s+/);
                    const cmd = (parts[0] || '').toLowerCase();
                    const args = parts.slice(1).join(' ');

                    if (history.length === 0 || history[history.length - 1] !== trimmed) {
                        history.push(trimmed);
                        if (history.length > 50) history.shift();
                    }
                    historyIdx = history.length;

                    printPromptEcho(trimmed);

                    if (cmd === 'clear') {
                        output.innerHTML = '';
                        printLine('<span style="color:var(--dim)">Terminal cleared. Type <span style="color:var(--white)">help</span> for commands.</span>');
                        return;
                    }

                    if (cmd === 'home') {
                        printLine('<span style="color:var(--dim)">Returning to main portfolio...</span>');
                        await sleep(600);
                        window.location.href = 'index.html';
                        return;
                    }

                    let lines;
                    switch (cmd) {
                        case 'help': lines = cmdHelp(); break;
                        case 'whoami': lines = cmdWhoami(); break;
                        case 'projects': lines = cmdProjects(); break;
                        case 'skills': lines = cmdSkills(); break;
                        case 'education': lines = cmdEducation(); break;
                        case 'connect': lines = cmdConnect(); break;
                        case 'pwd': lines = cmdPwd(); break;
                        case 'dir': lines = cmdDir(args); break;
                        case 'ls': lines = cmdDir(args); break;
                        case 'cd': lines = cmdCd(args); break;
                        case 'tree': lines = cmdTree(args); break;
                        case 'type': lines = cmdType(args); break;
                        case 'cat': lines = cmdType(args); break;
                        case 'open': lines = cmdOpen(args); break;
                        case 'explorer': lines = cmdExplorer(args); break;
                        default:
                            lines = ['<span style="color:var(--white)">\'' + escapeHTML(trimmed) + '\'</span> is not recognized. Type <span style="color:var(--white)">help</span> for commands.'];
                    }

                    await printLinesAnimated(lines);
                }

                // Welcome message
                printLine('<span style="color:var(--white)">Alhiem\'s Terminal v2.1.0</span>');
                printLine('<span style="color:var(--dim)">XP file-system mode enabled. Type <span style="color:var(--white)">help</span> for commands.</span>');
                printLine('');
                updatePromptPath();

                input.addEventListener('input', updateMirror);
                input.addEventListener('keyup', updateMirror);
                input.addEventListener('click', updateMirror);

                input.addEventListener('keydown', async (e) => {
                    if (isLocked) { e.preventDefault(); return; }

                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const val = input.value;
                        input.value = '';
                        updateMirror();
                        isLocked = true;
                        await processCommand(val);
                        isLocked = false;
                        input.focus();
                        updateMirror();
                        return;
                    }

                    if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        if (history.length === 0) return;
                        if (historyIdx > 0) historyIdx--;
                        input.value = history[historyIdx] || '';
                        updateMirror();
                        return;
                    }

                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        if (historyIdx < history.length - 1) {
                            historyIdx++;
                            input.value = history[historyIdx] || '';
                        } else {
                            historyIdx = history.length;
                            input.value = '';
                        }
                        updateMirror();
                        return;
                    }

                    if (e.key === 'Tab') {
                        e.preventDefault();
                        const partial = input.value.trim().toLowerCase();
                        if (!partial || partial.includes(' ')) return;
                        const matches = COMMANDS.filter(c => c.startsWith(partial));
                        if (matches.length === 1) {
                            input.value = matches[0];
                            updateMirror();
                        }
                        return;
                    }

                    if (e.key === 'l' && e.ctrlKey) {
                        e.preventDefault();
                        input.value = '';
                        updateMirror();
                        output.innerHTML = '';
                        printLine('<span style="color:var(--dim)">Terminal cleared. Type <span style="color:var(--white)">help</span> for commands.</span>');
                        return;
                    }
                });

                input.focus();
                updateMirror();
            }

            // ── Console Easter Egg ──
            console.log('%c' +
                '███████╗███████╗██╗  ██╗\n' +
                '██╔════╝██╔════╝██║  ██║\n' +
                '███████╗███████╗███████║\n' +
                '╚════██║╚════██║██╔══██║\n' +
                '███████║███████║██║  ██║\n' +
                '╚══════╝╚══════╝╚═╝  ╚═╝\n\n' +
                '  Welcome to the desktop.',
                'color: #C3B5FF; font-family: monospace; font-size: 12px;'
            );

        })();
    </script>

    <style>

            * {
                cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22"><polygon points="1,1 1,16 6,12 9,18 12,17 9,11 14,11" fill="%23C3B5FF" stroke="black" stroke-width="1"/></svg>'), auto !important;
            }

            .clickable,
            a,
            button,
            .desktop-icon,

            [onclick] {

            }

            iframe,
            #doom-container *,
            input,
            textarea,
            .terminal-body * {
                cursor: auto !important;
            }

            .sparkle {
                position: fixed;
                pointer-events: none;
                z-index: 9999999;
                width: 6px;
                height: 6px;
                background: #C3B5FF;
                animation: spark-anim 0.6s linear forwards;
            }

            @keyframes spark-anim {
                0% {
                    transform: scale(1) rotate(0deg);
                    opacity: 1;
                }

                100% {
                    transform: scale(0) rotate(180deg) translate(0px, 20px);
                    opacity: 0;
                }
            }
        }
    </style>
    <script>
        if (window.matchMedia("(pointer: fine)").matches) {
            let lastSparkle = 0;
            document.addEventListener('mousemove', e => {
                const now = Date.now();
                if (now - lastSparkle > 40 && Math.random() < 0.4) {
                    lastSparkle = now;
                    const spark = document.createElement('div');
                    spark.className = 'sparkle';
                    spark.style.left = (e.clientX + 6) + 'px';
                    spark.style.top = (e.clientY + 12) + 'px';
                    document.body.appendChild(spark);
                    setTimeout(() => spark.remove(), 600);
                }
            });
        }
    </script>
